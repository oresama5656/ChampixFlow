    <style>
      /* 印刷時スタイル：A5横（210mm × 148mm）でスタンプカードのみ表示 */
      @media print {
        @page { size: A5 landscape; margin: 0; }
        body > *:not(#stamp-card-print) { display: none !important; }
        #stamp-card-print {
          display: block !important;
          position: fixed;
          top: 0; left: 0;
          width: 210mm;
          height: 148mm;
          background: white;
          -webkit-print-color-adjust: exact;
          print-color-adjust: exact;
        }
      }
    </style>
